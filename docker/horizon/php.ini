; ── PHP general ──────────────────────────────────────────────
upload_max_filesize = 50M
post_max_size = 50M
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
date.timezone = America/Mexico_City

; ── OPcache (desarrollo: desactivado para ver cambios al vuelo) ──
opcache.enable = 0

; ── Xdebug 3 ────────────────────────────────────────────────
; Modo 'develop' activa mejor mensajes de error.
; Cambiar a 'debug' para step-debugging con VS Code / PhpStorm.
xdebug.mode = develop
xdebug.start_with_request = yes
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.log = /tmp/xdebug.log
xdebug.idekey = VSCODE

; ── Errores (desarrollo: mostrar todo) ───────────────────────
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /var/www/storage/logs/php_errors.log